<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BENCH120">
<meta name="theme-color" content="#0e0f12">
<title>BENCH 120 ｜ ピーキング</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0b; --surface:#141414; --elevated:#1d1d1e; --line:#2c2c2e;
  --text:#f4f3ef; --muted:#9b9b97; --faint:#5d5d5a;
  --accent:#f7c21a; --accent-dim:#6e560f; --accent-ink:#1a1400;
  --acc:#4a86d6; --int:#ee7b2b; --del:#5fb85a; --peak:#b56fe0; --test:#ff4d4d;
  --ok:#5fb85a;
  --safe-top:env(safe-area-inset-top); --safe-bot:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:'Archivo',system-ui,-apple-system,sans-serif;
  -webkit-text-size-adjust:100%;overscroll-behavior-y:none;}
body{padding-bottom:calc(28px + var(--safe-bot));}
.mono{font-family:'DM Mono',ui-monospace,monospace;}

/* ---- Header ---- */
header{position:sticky;top:0;z-index:50;
  background:linear-gradient(180deg,#0a0a0b 72%,rgba(10,10,11,.92));
  padding:calc(12px + var(--safe-top)) 16px 12px;border-bottom:2px solid var(--accent);
  backdrop-filter:blur(8px);}
.hrow{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.brand{display:flex;align-items:center;gap:11px;min-width:0;}
.emblem{width:44px;height:44px;flex:none;border:2px solid var(--accent);border-radius:12px;
  display:flex;align-items:center;justify-content:center;color:var(--accent);}
.logo{font-family:'Anton',sans-serif;font-weight:400;font-size:26px;letter-spacing:1.2px;line-height:.92;text-transform:uppercase;}
.logo b{color:var(--accent);font-weight:400;}
.goal{font-family:'DM Mono';font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:.4px;}
.goal s{color:var(--accent);text-decoration:none;font-weight:500;}
.ring{position:relative;width:52px;height:52px;flex:none;}
.ring svg{transform:rotate(-90deg);}
.ringpct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'DM Mono';font-size:12px;font-weight:500;color:var(--text);}
.savetag{font-size:10px;color:var(--faint);}
.barmeta{display:flex;justify-content:space-between;margin-top:10px;font-size:11px;color:var(--muted);}
.barmeta .count{font-family:'DM Mono';color:var(--text);font-weight:500;}

/* ---- Toolbar ---- */
.tools{display:flex;gap:8px;padding:12px 16px 4px;flex-wrap:wrap;}
.tbtn{flex:1;min-width:84px;background:var(--surface);border:1px solid var(--line);
  color:var(--text);font-family:inherit;font-size:12px;font-weight:600;
  padding:10px 8px;border-radius:11px;cursor:pointer;text-align:center;}
.tbtn:active{background:var(--elevated);}
.tbtn.go{background:var(--accent);border-color:var(--accent);color:#170a05;}

.legend{display:flex;gap:6px;flex-wrap:wrap;padding:8px 16px 4px;}
.lg{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px;}
.lg i{width:9px;height:9px;border-radius:3px;display:inline-block;}

/* ---- Week card ---- */
main{padding:8px 12px;}
.wk{background:var(--surface);border:1px solid var(--line);border-radius:16px;
  margin:10px 0;overflow:hidden;border-left:4px solid var(--phase);}
.wkhead{display:flex;align-items:center;gap:10px;padding:15px 14px;cursor:pointer;}
.wkhead .ttl{flex:1;min-width:0;}
.wkhead .lab{font-weight:800;font-size:14.5px;line-height:1.25;}
.wkhead .phase{font-size:10.5px;color:var(--phase);font-weight:700;letter-spacing:.4px;margin-top:2px;}
.wkprog{font-family:'DM Mono';font-size:12px;color:var(--muted);white-space:nowrap;}
.wkprog.done{color:var(--ok);}
.chev{color:var(--faint);font-size:13px;transition:transform .25s;}
.wk.open .chev{transform:rotate(90deg);}
.wkdone-badge{display:none;}
.wk.alldone{border-left-color:var(--ok);}
.wk.alldone .wkhead .lab::after{content:" ✓";color:var(--ok);}

.wkbody{display:none;padding:0 14px 14px;}
.wk.open .wkbody{display:block;animation:fade .25s;}
@keyframes fade{from{opacity:0;transform:translateY(-4px);}to{opacity:1;}}
.intro{font-size:12px;color:var(--muted);line-height:1.5;background:var(--elevated);
  border-radius:10px;padding:9px 11px;margin-bottom:12px;}

/* ---- Day ---- */
.day{margin-top:14px;}
.dayhead{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;}
.dayname{font-weight:700;font-size:13px;color:var(--text);}
.dateinp{background:var(--elevated);border:1px solid var(--line);color:var(--text);
  font-family:'DM Mono';font-size:12px;border-radius:9px;padding:7px 9px;min-width:140px;}
.dateinp::-webkit-date-and-time-value{text-align:left;}

.ex{display:flex;align-items:flex-start;gap:11px;padding:11px 4px;border-top:1px solid var(--line);}
.ex:first-of-type{border-top:none;}
.chk{flex:none;width:26px;height:26px;border-radius:8px;border:2px solid var(--faint);
  margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:.15s;background:transparent;}
.chk svg{width:15px;height:15px;stroke:#170a05;stroke-width:3.5;fill:none;
  stroke-linecap:round;stroke-linejoin:round;opacity:0;}
.ex.done .chk{background:var(--accent);border-color:var(--accent);}
.ex.done .chk svg{opacity:1;}
.exmain{flex:1;min-width:0;}
.exname{font-size:13.5px;font-weight:600;line-height:1.3;}
.ex.done .exname{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--accent-dim);}
.exnums{font-family:'DM Mono';font-size:12.5px;color:var(--accent);margin-top:3px;}
.exnums .lt{color:var(--muted);}
.exnums.speed{color:var(--int);}
.exnums.warm{color:var(--muted);}
.rpe{flex:none;font-family:'DM Mono';font-size:11px;font-weight:500;color:var(--muted);
  border:1px solid var(--line);border-radius:7px;padding:3px 6px;margin-top:1px;white-space:nowrap;}
.actual{margin-top:6px;}
.actual input{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);
  font-family:'DM Mono';font-size:12px;border-radius:8px;padding:6px 9px;}
.actual input::placeholder{color:var(--faint);}
.memo{font-size:11.5px;color:var(--faint);line-height:1.5;margin-top:11px;
  padding-left:11px;border-left:2px solid var(--line);}
.rest .exnums{display:none;}

.note{font-size:11px;color:var(--faint);text-align:center;padding:22px 24px;line-height:1.6;}
.note a{color:var(--muted);}
#file{display:none;}
.toast{position:fixed;left:50%;bottom:calc(24px + var(--safe-bot));transform:translateX(-50%) translateY(20px);
  background:var(--accent);color:#170a05;font-weight:700;font-size:13px;padding:10px 20px;border-radius:30px;
  opacity:0;transition:.3s;z-index:100;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ---- 種目説明 (info sheet) ---- */
.exname.tappable{cursor:pointer;}
.exname .info{display:inline-block;margin-left:7px;font-size:10.5px;color:var(--accent);
  border:1px solid var(--accent-dim);border-radius:6px;padding:1px 6px;vertical-align:middle;font-weight:600;white-space:nowrap;}
.tbtn.book{background:var(--elevated);border-color:var(--accent-dim);color:var(--accent);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:.25s;z-index:200;}
.overlay.show{opacity:1;pointer-events:auto;}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:201;background:var(--surface);border-top:1px solid var(--line);
  border-radius:18px 18px 0 0;padding:16px 18px calc(28px + var(--safe-bot));max-height:84vh;overflow-y:auto;
  transform:translateY(101%);transition:.28s cubic-bezier(.2,.8,.2,1);-webkit-overflow-scrolling:touch;}
.sheet.show{transform:translateY(0);}
.sheet .grip{width:42px;height:4px;border-radius:3px;background:var(--line);margin:2px auto 14px;}
.sheet .close{position:absolute;top:14px;right:16px;width:32px;height:32px;border-radius:50%;border:1px solid var(--line);
  background:var(--elevated);color:var(--text);font-size:17px;line-height:1;cursor:pointer;}
.sheet h3{margin:2px 40px 2px 0;font-size:18px;font-weight:800;line-height:1.3;}
.sheet .diff{color:var(--muted);font-size:12.5px;line-height:1.5;margin:6px 0 4px;}
.sheet h4{font-size:11px;color:var(--accent);font-weight:700;letter-spacing:.6px;margin:16px 0 6px;}
.sheet ol{margin:0;padding-left:20px;}
.sheet ol li{font-size:13.5px;line-height:1.6;margin-bottom:6px;}
.sheet .box{font-size:13px;line-height:1.55;background:var(--elevated);border-radius:10px;padding:10px 12px;}
.sheet .box.warn{border-left:3px solid var(--test);}
.sheet .box.aim{border-left:3px solid var(--accent);}
.idxbtn{display:block;width:100%;text-align:left;background:var(--elevated);border:1px solid var(--line);
  color:var(--text);font-family:inherit;font-size:14px;font-weight:700;padding:13px 14px;border-radius:11px;margin-bottom:8px;cursor:pointer;}
.idxbtn small{display:block;color:var(--muted);font-weight:400;font-size:11.5px;margin-top:3px;}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <div class="brand">
      <div class="emblem" aria-hidden="true">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="6" y1="13" x2="20" y2="13"/>
          <rect x="2.5" y="9" width="3.2" height="8" rx="1.2" fill="currentColor" stroke="none"/>
          <rect x="20.3" y="9" width="3.2" height="8" rx="1.2" fill="currentColor" stroke="none"/>
          <line x1="7.5" y1="10.5" x2="7.5" y2="15.5"/>
          <line x1="18.5" y1="10.5" x2="18.5" y2="15.5"/>
        </svg>
      </div>
      <div>
        <div class="logo">BENCH <b>120</b></div>
        <div class="goal"><span id="dispmax">115</span> → <s>120 KG</s></div>
      </div>
    </div>
    <div class="ring">
      <svg width="52" height="52" viewBox="0 0 52 52">
        <circle cx="26" cy="26" r="21" fill="none" stroke="var(--elevated)" stroke-width="5"/>
        <circle id="ringfill" cx="26" cy="26" r="21" fill="none" stroke="var(--accent)" stroke-width="5" stroke-linecap="round" stroke-dasharray="131.9" stroke-dashoffset="131.9" style="transition:stroke-dashoffset .45s ease"/>
      </svg>
      <span class="ringpct" id="pctlabel">0%</span>
    </div>
  </div>
  <div class="barmeta">
    <span><span class="count" id="countlabel">0/0</span> 完了</span>
    <span class="savetag" id="savetag">✓ 自動保存</span>
  </div>
</header>

<div class="tools">
  <button class="tbtn go" onclick="jumpNext()">次の未完了へ</button>
  <button class="tbtn book" onclick="openIndex()">📖 種目の説明</button>
  <button class="tbtn" onclick="exportData()">バックアップ書出</button>
  <button class="tbtn" onclick="document.getElementById('file').click()">復元</button>
  <button class="tbtn" onclick="resetAll()">リセット</button>
  <input type="file" id="file" accept="application/json" onchange="importData(this)">
</div>
<div class="legend">
  <span class="lg"><i style="background:var(--acc)"></i>蓄積</span>
  <span class="lg"><i style="background:var(--int)"></i>強度</span>
  <span class="lg"><i style="background:var(--del)"></i>デロード</span>
  <span class="lg"><i style="background:var(--peak)"></i>ピーク</span>
  <span class="lg"><i style="background:var(--test)"></i>テスト</span>
</div>

<main id="app"></main>
<div class="note">
  iPhoneでアプリ化:<br>Safariの共有ボタン → 「ホーム画面に追加」<br>
  進捗は端末内に自動保存されます。機種変更や万一の消失に備え、時々「バックアップ書出」でファイルを保存してください。
</div>
<div class="toast" id="toast"></div>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"><div class="grip"></div><button class="close" onclick="closeSheet()">✕</button><div id="sheetbody"></div></div>

const KEY="bench120_v2";
let S={dates:{},checks:{},actuals:{},open:0};
try{const r=localStorage.getItem(KEY); if(r)S=Object.assign(S,JSON.parse(r));}catch(e){}

function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}
function fmt(w){return (Number.isInteger(w)?w:w).toString();}

/* ===== 種目の説明 ===== */
const EXPLAIN={
 base:{t:"基本フォーム & 安全",diff:"全種目に共通。まずここを押さえる。",
   how:["ベンチに寝て、目線がバーの真下にくる位置に","肩甲骨を寄せて下げる(胸を張る)。軽くアーチを作る","足は床をしっかり踏む(かかとを引く)","グリップは肩幅よりやや広め。親指は必ず握り込む(サムレス厳禁)","息を吸って腹圧 → みぞおち〜乳頭の間へコントロールして下ろす → 脚で床を押しながら肩の上へ押し切る"],
   aim:"全バリエーションの土台になるフォーム。",
   warn:"ラックのセーフティピンを必ず『胸の高さの少し下』にセット。潰れてもバーが止まります。1人の時・高重量・ポーズ系では必須。"},
 comp:{t:"ベンチ(コンペ)",diff:"基本フォームそのまま。毎回まったく同じ動きで反復する。",
   how:["みぞおち〜乳頭の間に下ろし、胸に軽く触れる","止めずに(または一定リズムで)肩の上へ押し切る","毎回同じフォーム・同じ軌道を意識する"],
   aim:"本番フォームの固め・再現性。",warn:"フォームを毎回ブレさせないことが最優先。"},
 narrow:{t:"ナロー(クローズグリップ)",diff:"手幅を狭め、肘を締めて腕(三頭筋)で押す。",
   how:["手幅を肩幅くらいに(狭めすぎ厳禁)","肘を体側に近づけて、みぞおち寄りに下ろす","胸より腕の裏(三頭筋)で押す感覚で挙げる"],
   aim:"三頭筋・ロックアウト(押し切り)の強化。",warn:"狭くしすぎると手首を痛める。肩肘が痛ければ少し広げる。"},
 paused:{t:"ポーズベンチ(2秒静止)",diff:"胸で2秒止めてから押す(反動を使わない)。",
   how:["胸に着けたら動きを止めて2秒キープ","止めている間も全身の張りは抜かない","2秒後に脚で押しながら挙げる"],
   aim:"胸からゼロで押し出す力。あなたの弱点(ボトム)を直撃。",warn:"重量は通常より落ちて当然。バウンドさせない。"},
 spoto:{t:"スポトプレス",diff:"胸に着けず、胸の手前で止める。",
   how:["胸の2〜3cm手前まで下ろす","そこで1秒静止(バーは胸に触れない)","静止位置から押し上げる"],
   aim:"一番詰まる局面そのものを鍛える。",warn:"止める高さを毎回一定に。最初は鏡や補助者で位置確認を。"},
 feetup:{t:"足上げベンチ",diff:"足を床から離し、上半身だけで挙げる。",
   how:["足をベンチに乗せる、または膝を曲げて宙に上げる","アーチ・脚の反動を使わず、大胸筋と体幹で挙げる","バランスを保ちながらゆっくり動作"],
   aim:"脚に頼らない純粋な上半身の力。",warn:"バランスを崩しやすい→重量控えめ・セーフティ必須・腰を反りすぎない。"},
 pin:{t:"ピンプレス(胸高ピン・デッドストップ) ★最重要",diff:"ピンに置いた静止状態から、ゼロ初速で押す。",
   how:["ラックのピンを『胸に着く高さ』にセット","バーをピンに完全に置き、一瞬力を抜く","止まった状態から一気に押し上げる"],
   aim:"ボトムの絶対筋力。あなたの最強の武器。",warn:"毎回しっかり降ろし切り、脱力してから押す。反動を使わない。"},
 dynamic:{t:"ダイナミックベンチ(スピード)",diff:"軽い重量を、押すときだけ全力で速く。",
   how:["軽い重量(50〜65%)を使う","下ろしは普通の速さで","押す瞬間だけ爆発的に・できる限り速く挙げる"],
   aim:"胸からの初速(力の立ち上がり)を上げる。",warn:"重さでなく速度が目的。バーは握ったまま加速し放り投げない。セット間はしっかり休む。"},
 warmup:{t:"ウォームアップ",diff:"本番前の準備セット。",
   how:["軽い重量から段階的に上げる","フォーム確認と関節を温めるのが目的","疲れない範囲で(追い込まない)"],
   aim:"本番の重量に体を慣らす。",warn:"ここで疲労を残さない。"},
 rest:{t:"完全休養",diff:"トレーニングを休む日。",
   how:["重い練習はしない","軽い有酸素やストレッチはOK"],
   aim:"疲労を抜いて回復する(ピーキングの肝)。",warn:"『休む勇気』。ここで追い込むと本番に響く。"},
};
function infoKey(name){
 if(name.includes('ナロー'))return 'narrow';
 if(name.includes('スポト'))return 'spoto';
 if(name.includes('足上げ'))return 'feetup';
 if(name.includes('ピンプレス'))return 'pin';
 if(name.includes('ダイナミック'))return 'dynamic';
 if(name.includes('ポーズ'))return 'paused';
 if(name.includes('W-up'))return 'warmup';
 if(name.includes('休養')||name.includes('休'))return 'rest';
 if(name.includes('ベンチ'))return 'comp';
 return null;
}
function sheetShow(html){document.getElementById('sheetbody').innerHTML=html;
 document.getElementById('overlay').classList.add('show');document.getElementById('sheet').classList.add('show');}
function closeSheet(){document.getElementById('overlay').classList.remove('show');document.getElementById('sheet').classList.remove('show');}
function openInfo(key){const e=EXPLAIN[key];if(!e)return;
 let h=`<h3>${e.t}</h3><div class="diff">${e.diff}</div>`;
 h+=`<h4>やり方</h4><ol>${e.how.map(s=>`<li>${s}</li>`).join('')}</ol>`;
 h+=`<h4>狙い</h4><div class="box aim">${e.aim}</div>`;
 h+=`<h4>注意</h4><div class="box warn">${e.warn}</div>`;
 if(key!=='base'){h+=`<h4 style="margin-top:18px">共通</h4><button class="idxbtn" onclick="openInfo('base')">基本フォーム & 安全<small>全種目共通の構え・セーフティの置き方</small></button>`;}
 sheetShow(h);}
function openIndex(){
 const order=[['base','まずこれ。共通の構え・セーフティ'],['comp','本番フォームの固め'],['narrow','三頭・押し切りの強化'],
  ['paused','ボトムの力(弱点直撃)'],['spoto','詰まる局面を鍛える(弱点直撃)'],['feetup','脚に頼らない上半身'],
  ['pin','ボトム絶対筋力(最重要の武器)'],['dynamic','胸からの初速・爆発力'],['warmup','本番前の準備'],['rest','回復日']];
 let h=`<h3>種目の説明</h3><div class="diff">見たい種目をタップ。各週の種目名の「ⓘやり方」からも開けます。</div>`;
 h+=order.map(([k,d])=>`<button class="idxbtn" onclick="openInfo('${k}')">${EXPLAIN[k].t}<small>${d}</small></button>`).join('');
 sheetShow(h);}


const app=document.getElementById('app');
function render(){
  app.innerHTML='';
  PROGRAM.forEach((wk,wi)=>{
    const ids=[]; wk.days.forEach((d,di)=>d.lifts.forEach((l,li)=>ids.push(`${wi}_${di}_${li}`)));
    const done=ids.filter(id=>S.checks[id]).length, tot=ids.length, all=done===tot&&tot>0;
    const card=document.createElement('div');
    card.className='wk'+(S.open===wi?' open':'')+(all?' alldone':'');
    card.style.setProperty('--phase',wk.c);
    let body=`<div class="intro">${wk.intro}</div>`;
    wk.days.forEach((d,di)=>{
      const dkey=`${wi}_${di}`;
      body+=`<div class="day"><div class="dayhead"><span class="dayname">${d.n}</span>`+
        `<input class="dateinp" type="date" value="${S.dates[dkey]||''}" onchange="setDate('${dkey}',this.value)"></div>`;
      d.lifts.forEach((l,li)=>{
        const id=`${wi}_${di}_${li}`, ck=!!S.checks[id];
        const [name,w,reps,sets,rpe,kind]=l;
        let nums='';
        if(kind===0){nums='';}
        else if(kind===3){nums=`<div class="exnums warm">${fmt(w)}<span class="lt">kg ×${reps}</span></div>`;}
        else if(kind===2){nums=`<div class="exnums speed">${fmt(w)}<span class="lt">kg × ${reps}回 × ${sets}set</span></div>`;}
        else{nums=`<div class="exnums">${fmt(w)}<span class="lt">kg × ${reps}回 × ${sets}set</span></div>`;}
        const rpebadge=rpe?`<span class="rpe">${rpe}</span>`:'';
        const actual=(kind===1)?`<div class="actual"><input type="text" placeholder="実測 (例: 92.5×5 楽だった)" value="${(S.actuals[id]||'').replace(/"/g,'&quot;')}" oninput="setAct('${id}',this.value)"></div>`:'';
        const ik=infoKey(name);
        const nameHtml=ik?`<div class="exname tappable" onclick="openInfo('${ik}')">${name}<span class="info">ⓘやり方</span></div>`:`<div class="exname">${name}</div>`;
        body+=`<div class="ex${ck?' done':''}${kind===0?' rest':''}" >`+
          `<div class="chk" onclick="toggle('${id}')"><svg viewBox="0 0 24 24"><path d="M4 12l5 5L20 6"/></svg></div>`+
          `<div class="exmain">${nameHtml}${nums}${actual}</div>${rpebadge}</div>`;
      });
      body+=`<div class="memo">${d.memo}</div></div>`;
    });
    card.innerHTML=`<div class="wkhead" onclick="toggleWk(${wi})">`+
      `<div class="ttl"><div class="lab">${wk.lab}</div><div class="phase">${wk.ph}</div></div>`+
      `<span class="wkprog${all?' done':''}">${done}/${tot}</span><span class="chev">▶</span></div>`+
      `<div class="wkbody">${body}</div>`;
    app.appendChild(card);
  });
  updateBar();
}
function updateBar(){
  let done=0,tot=0;
  PROGRAM.forEach((wk,wi)=>wk.days.forEach((d,di)=>d.lifts.forEach((l,li)=>{tot++; if(S.checks[`${wi}_${di}_${li}`])done++;})));
  const p=tot?Math.round(done/tot*100):0;
  const C=131.9, off=C*(1-p/100);
  const rf=document.getElementById('ringfill'); if(rf)rf.style.strokeDashoffset=off.toFixed(1);
  document.getElementById('pctlabel').textContent=p+'%';
  const cl=document.getElementById('countlabel'); if(cl)cl.textContent=done+'/'+tot;
}
function flash(){const t=document.getElementById('savetag'); t.textContent='✓ 保存しました'; t.style.color='var(--ok)';
  clearTimeout(window._ft); window._ft=setTimeout(()=>{t.textContent='✓ 自動保存';t.style.color='';},1200);}
function toggle(id){S.checks[id]=!S.checks[id]; if(!S.checks[id])delete S.checks[id]; save(); flash(); render();}
function setDate(k,v){if(v)S.dates[k]=v;else delete S.dates[k]; save(); flash();}
function setAct(id,v){if(v)S.actuals[id]=v;else delete S.actuals[id]; save();}
function toggleWk(wi){S.open=(S.open===wi?-1:wi); save(); render();
  if(S.open===wi){const el=app.children[wi]; setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'start'}),60);}}
function jumpNext(){
  for(let wi=0;wi<PROGRAM.length;wi++){const wk=PROGRAM[wi];let inc=false;
    wk.days.forEach((d,di)=>d.lifts.forEach((l,li)=>{if(!S.checks[`${wi}_${di}_${li}`])inc=true;}));
    if(inc){S.open=wi;save();render();const el=app.children[wi];setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'start'}),60);return;}}
  toast('全メニュー完了！お疲れさまでした');
}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1900);}
function exportData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='bench120_backup_'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();a.remove();toast('バックアップを書き出しました');
}
function importData(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();
  r.onload=e=>{try{const d=JSON.parse(e.target.result);S=Object.assign({dates:{},checks:{},actuals:{},open:0},d);save();render();toast('復元しました');}catch(err){toast('読み込み失敗');}};
  r.readAsText(f);inp.value='';}
function resetAll(){if(confirm('全ての日付・チェック・実測を消去します。よろしいですか？')){S={dates:{},checks:{},actuals:{},open:0};save();render();toast('リセットしました');}}
render();
</script>
</body>
