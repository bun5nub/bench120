<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BIG3 PEAK">
<meta name="theme-color" content="#0a0a0b">
<title>BIG3 PEAK ｜ 目標から自動設計</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0b; --surface:#141414; --elevated:#1d1d1e; --line:#2c2c2e;
  --text:#f4f3ef; --muted:#9b9b97; --faint:#5d5d5a;
  --accent:#f7c21a; --accent-dim:#6e560f; --accent-ink:#1a1400;
  --acc:#4a86d6; --int:#ee7b2b; --del:#5fb85a; --peak:#b56fe0; --test:#ff4d4d;
  --ok:#5fb85a;
  --safe-top:env(safe-area-inset-top); --safe-bot:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:'Archivo',system-ui,-apple-system,sans-serif;
  -webkit-text-size-adjust:100%;overscroll-behavior-y:none;}
body{padding-bottom:calc(28px + var(--safe-bot));}
.mono{font-family:'DM Mono',ui-monospace,monospace;}

/* ---- Header ---- */
header{position:sticky;top:0;z-index:50;
  background:linear-gradient(180deg,#0a0a0b 72%,rgba(10,10,11,.92));
  padding:calc(12px + var(--safe-top)) 16px 0;border-bottom:2px solid var(--accent);
  backdrop-filter:blur(8px);}
.hrow{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.brand{display:flex;align-items:center;gap:11px;min-width:0;}
.emblem{width:44px;height:44px;flex:none;border:2px solid var(--accent);border-radius:12px;
  display:flex;align-items:center;justify-content:center;color:var(--accent);}
.logo{font-family:'Anton',sans-serif;font-weight:400;font-size:26px;letter-spacing:1.2px;line-height:.92;text-transform:uppercase;}
.logo b{color:var(--accent);font-weight:400;}
.goal{font-family:'DM Mono';font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:.4px;}
.goal s{color:var(--accent);text-decoration:none;font-weight:500;}
.ring{position:relative;width:52px;height:52px;flex:none;}
.ring svg{transform:rotate(-90deg);}
.ringpct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'DM Mono';font-size:12px;font-weight:500;color:var(--text);}
.savetag{font-size:10px;color:var(--faint);}
.barmeta{display:flex;justify-content:space-between;margin-top:10px;font-size:11px;color:var(--muted);}
.barmeta .count{font-family:'DM Mono';color:var(--text);font-weight:500;}

/* ---- Lift tabs ---- */
.tabs{display:flex;gap:6px;margin-top:12px;}
.tab{flex:1;background:transparent;border:none;border-bottom:3px solid transparent;
  color:var(--muted);font-family:'Anton',sans-serif;font-size:15px;letter-spacing:.6px;
  padding:9px 4px 10px;cursor:pointer;text-transform:uppercase;transition:.15s;}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);}

/* ---- Setup card ---- */
.setup{background:var(--surface);border:1px solid var(--line);border-radius:14px;margin:12px 12px 0;padding:13px 14px;}
.setup .lbl{font-size:11px;color:var(--accent);font-weight:700;letter-spacing:.5px;margin-bottom:9px;text-transform:uppercase;}
.inrow{display:flex;gap:10px;}
.infield{flex:1;}
.infield span{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;}
.infield .u{font-size:10px;color:var(--faint);}
.numin{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);
  font-family:'DM Mono';font-size:18px;font-weight:500;border-radius:9px;padding:9px 10px;text-align:center;}
.numin.tgt{border-color:var(--accent-dim);color:var(--accent);}
.feasib{font-size:11.5px;line-height:1.5;margin-top:10px;border-radius:9px;padding:8px 10px;}
.feasib.ok{color:var(--ok);background:rgba(95,184,90,.10);}
.feasib.warn{color:var(--int);background:rgba(238,123,43,.12);}
.feasib.bad{color:var(--test);background:rgba(255,77,77,.12);}
.moderow{display:flex;gap:6px;margin-bottom:11px;}
.modebtn{flex:1;background:var(--bg);border:1px solid var(--line);color:var(--muted);
  font-family:inherit;font-size:11.5px;font-weight:700;padding:8px 4px;border-radius:9px;cursor:pointer;}
.modebtn.on{background:var(--elevated);border-color:var(--accent-dim);color:var(--accent);}
.freqrow{display:flex;align-items:center;gap:8px;margin-top:10px;}
.freqrow span{font-size:11px;color:var(--muted);}
.freqseg{display:flex;gap:4px;}
.freqseg button{background:var(--bg);border:1px solid var(--line);color:var(--muted);
  font-family:'DM Mono';font-size:12px;width:34px;padding:6px 0;border-radius:8px;cursor:pointer;}
.freqseg button.on{background:var(--accent);border-color:var(--accent);color:#170a05;font-weight:700;}
.arbanner{display:flex;align-items:center;gap:8px;font-size:11.5px;line-height:1.45;margin-top:10px;
  border-radius:9px;padding:8px 10px;color:var(--peak);background:rgba(181,111,224,.12);}
.arbanner button{margin-left:auto;flex:none;background:transparent;border:1px solid var(--peak);
  color:var(--peak);font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:7px;cursor:pointer;}
.sched{background:var(--surface);border:1px solid var(--line);border-radius:14px;margin:12px 12px 0;padding:12px 14px;}
.sched .lbl{font-size:11px;color:var(--accent);font-weight:700;letter-spacing:.5px;margin-bottom:9px;text-transform:uppercase;}
.schedgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.schedgrid .d{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:7px 2px;text-align:center;min-height:54px;}
.schedgrid .d .dn{font-size:10px;color:var(--faint);margin-bottom:4px;}
.schedgrid .d .pill{display:block;font-size:10px;font-weight:700;border-radius:5px;padding:2px 0;margin:2px 1px;color:#0a0a0b;}
.schedgrid .d .rest{font-size:10px;color:var(--faint);margin-top:8px;}
.schedwarn{font-size:11.5px;line-height:1.5;margin-top:10px;border-radius:9px;padding:8px 10px;}
.schedwarn.ok{color:var(--ok);background:rgba(95,184,90,.10);}
.schedwarn.warn{color:var(--int);background:rgba(238,123,43,.12);}
.schedwarn.bad{color:var(--test);background:rgba(255,77,77,.12);}

/* ---- Toolbar ---- */
.tools{display:flex;gap:8px;padding:12px 16px 4px;flex-wrap:wrap;}
.tbtn{flex:1;min-width:84px;background:var(--surface);border:1px solid var(--line);
  color:var(--text);font-family:inherit;font-size:12px;font-weight:600;
  padding:10px 8px;border-radius:11px;cursor:pointer;text-align:center;}
.tbtn:active{background:var(--elevated);}
.tbtn.go{background:var(--accent);border-color:var(--accent);color:#170a05;}
.tbtn.book{background:var(--elevated);border-color:var(--accent-dim);color:var(--accent);}

.legend{display:flex;gap:6px;flex-wrap:wrap;padding:8px 16px 4px;}
.lg{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px;}
.lg i{width:9px;height:9px;border-radius:3px;display:inline-block;}

/* ---- Week card ---- */
main{padding:8px 12px;}
.wk{background:var(--surface);border:1px solid var(--line);border-radius:16px;
  margin:10px 0;overflow:hidden;border-left:4px solid var(--phase);}
.wkhead{display:flex;align-items:center;gap:10px;padding:15px 14px;cursor:pointer;}
.wkhead .ttl{flex:1;min-width:0;}
.wkhead .lab{font-weight:800;font-size:14.5px;line-height:1.25;}
.wkhead .phase{font-size:10.5px;color:var(--phase);font-weight:700;letter-spacing:.4px;margin-top:2px;}
.wkprog{font-family:'DM Mono';font-size:12px;color:var(--muted);white-space:nowrap;}
.wkprog.done{color:var(--ok);}
.chev{color:var(--faint);font-size:13px;transition:transform .25s;}
.wk.open .chev{transform:rotate(90deg);}
.wk.alldone{border-left-color:var(--ok);}
.wk.alldone .wkhead .lab::after{content:" ✓";color:var(--ok);}

.wkbody{display:none;padding:0 14px 14px;}
.wk.open .wkbody{display:block;animation:fade .25s;}
@keyframes fade{from{opacity:0;transform:translateY(-4px);}to{opacity:1;}}
.intro{font-size:12px;color:var(--muted);line-height:1.5;background:var(--elevated);
  border-radius:10px;padding:9px 11px;margin-bottom:12px;}

/* ---- Day ---- */
.day{margin-top:14px;}
.dayhead{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;}
.dayname{font-weight:700;font-size:13px;color:var(--text);}
.dateinp{background:var(--elevated);border:1px solid var(--line);color:var(--text);
  font-family:'DM Mono';font-size:12px;border-radius:9px;padding:7px 9px;min-width:140px;}
.dateinp::-webkit-date-and-time-value{text-align:left;}

.ex{display:flex;align-items:flex-start;gap:11px;padding:11px 4px;border-top:1px solid var(--line);}
.ex:first-of-type{border-top:none;}
.chk{flex:none;width:26px;height:26px;border-radius:8px;border:2px solid var(--faint);
  margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:.15s;background:transparent;}
.chk svg{width:15px;height:15px;stroke:#170a05;stroke-width:3.5;fill:none;
  stroke-linecap:round;stroke-linejoin:round;opacity:0;}
.ex.done .chk{background:var(--accent);border-color:var(--accent);}
.ex.done .chk svg{opacity:1;}
.exmain{flex:1;min-width:0;}
.exname{font-size:13.5px;font-weight:600;line-height:1.3;}
.ex.done .exname{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--accent-dim);}
.exnums{font-family:'DM Mono';font-size:12.5px;color:var(--accent);margin-top:3px;}
.exnums .lt{color:var(--muted);}
.exnums.speed{color:var(--int);}
.exnums.warm{color:var(--muted);}
.rpe{flex:none;font-family:'DM Mono';font-size:11px;font-weight:500;color:var(--muted);
  border:1px solid var(--line);border-radius:7px;padding:3px 6px;margin-top:1px;white-space:nowrap;}
.actual{margin-top:6px;}
.actual input{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);
  font-family:'DM Mono';font-size:12px;border-radius:8px;padding:6px 9px;}
.actual input::placeholder{color:var(--faint);}
.actual select{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);
  font-family:'Archivo',sans-serif;font-size:12.5px;border-radius:8px;padding:8px 9px;}
.reco{font-size:11.5px;margin-top:6px;border-radius:8px;padding:7px 9px;line-height:1.45;}
.reco.ok{color:var(--ok);background:rgba(95,184,90,.10);}
.reco.up{color:var(--accent);background:rgba(247,194,26,.12);}
.reco.down{color:var(--test);background:rgba(255,77,77,.12);}
.suggest{display:inline-block;margin-left:8px;font-size:10.5px;color:var(--accent);
  border:1px dashed var(--accent-dim);border-radius:6px;padding:1px 6px;font-family:'Archivo',sans-serif;}
.memo{font-size:11.5px;color:var(--faint);line-height:1.5;margin-top:11px;
  padding-left:11px;border-left:2px solid var(--line);}
.rest .exnums{display:none;}

.note{font-size:11px;color:var(--faint);text-align:center;padding:22px 24px;line-height:1.6;}
.note a{color:var(--muted);}
#file{display:none;}
.toast{position:fixed;left:50%;bottom:calc(24px + var(--safe-bot));transform:translateX(-50%) translateY(20px);
  background:var(--accent);color:#170a05;font-weight:700;font-size:13px;padding:10px 20px;border-radius:30px;
  opacity:0;transition:.3s;z-index:100;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ---- 種目説明 (info sheet) ---- */
.exname.tappable{cursor:pointer;}
.exname .info{display:inline-block;margin-left:7px;font-size:10.5px;color:var(--accent);
  border:1px solid var(--accent-dim);border-radius:6px;padding:1px 6px;vertical-align:middle;font-weight:600;white-space:nowrap;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:.25s;z-index:200;}
.overlay.show{opacity:1;pointer-events:auto;}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:201;background:var(--surface);border-top:1px solid var(--line);
  border-radius:18px 18px 0 0;padding:16px 18px calc(28px + var(--safe-bot));max-height:84vh;overflow-y:auto;
  transform:translateY(101%);transition:.28s cubic-bezier(.2,.8,.2,1);-webkit-overflow-scrolling:touch;}
.sheet.show{transform:translateY(0);}
.sheet .grip{width:42px;height:4px;border-radius:3px;background:var(--line);margin:2px auto 14px;}
.sheet .close{position:absolute;top:14px;right:16px;width:32px;height:32px;border-radius:50%;border:1px solid var(--line);
  background:var(--elevated);color:var(--text);font-size:17px;line-height:1;cursor:pointer;}
.sheet h3{margin:2px 40px 2px 0;font-size:18px;font-weight:800;line-height:1.3;}
.sheet .diff{color:var(--muted);font-size:12.5px;line-height:1.5;margin:6px 0 4px;}
.sheet h4{font-size:11px;color:var(--accent);font-weight:700;letter-spacing:.6px;margin:16px 0 6px;}
.sheet ol{margin:0;padding-left:20px;}
.sheet ol li{font-size:13.5px;line-height:1.6;margin-bottom:6px;}
.sheet .box{font-size:13px;line-height:1.55;background:var(--elevated);border-radius:10px;padding:10px 12px;}
.sheet .box.warn{border-left:3px solid var(--test);}
.sheet .box.aim{border-left:3px solid var(--accent);}
.idxbtn{display:block;width:100%;text-align:left;background:var(--elevated);border:1px solid var(--line);
  color:var(--text);font-family:inherit;font-size:14px;font-weight:700;padding:13px 14px;border-radius:11px;margin-bottom:8px;cursor:pointer;}
.idxbtn small{display:block;color:var(--muted);font-weight:400;font-size:11.5px;margin-top:3px;}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <div class="brand">
      <div class="emblem" aria-hidden="true">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="6" y1="13" x2="20" y2="13"/>
          <rect x="2.5" y="9" width="3.2" height="8" rx="1.2" fill="currentColor" stroke="none"/>
          <rect x="20.3" y="9" width="3.2" height="8" rx="1.2" fill="currentColor" stroke="none"/>
          <line x1="7.5" y1="10.5" x2="7.5" y2="15.5"/>
          <line x1="18.5" y1="10.5" x2="18.5" y2="15.5"/>
        </svg>
      </div>
      <div>
        <div class="logo" id="logo">BIG3 <b id="liftname">BENCH</b></div>
        <div class="goal"><span id="dispcur">115</span> → <s id="disptgt">120 KG</s></div>
      </div>
    </div>
    <div class="ring">
      <svg width="52" height="52" viewBox="0 0 52 52">
        <circle cx="26" cy="26" r="21" fill="none" stroke="var(--elevated)" stroke-width="5"/>
        <circle id="ringfill" cx="26" cy="26" r="21" fill="none" stroke="var(--accent)" stroke-width="5" stroke-linecap="round" stroke-dasharray="131.9" stroke-dashoffset="131.9" style="transition:stroke-dashoffset .45s ease"/>
      </svg>
      <span class="ringpct" id="pctlabel">0%</span>
    </div>
  </div>
  <div class="barmeta">
    <span><span class="count" id="countlabel">0/0</span> 完了</span>
    <span class="savetag" id="savetag">✓ 自動保存</span>
  </div>
  <div class="tabs" id="tabs"></div>
</header>

<div class="setup">
  <div class="moderow">
    <button class="modebtn" id="mode-focus" onclick="setMode('focus')">1種目に集中</button>
    <button class="modebtn" id="mode-concurrent" onclick="setMode('concurrent')">BIG3を並行</button>
  </div>
  <div class="lbl" id="setuplbl">ベンチプレス｜目標設定</div>
  <div class="inrow">
    <label class="infield"><span>現在の最大 <i class="u">1RM kg</i></span>
      <input class="numin" id="curin" type="number" inputmode="decimal" step="2.5" onchange="setCfg('cur',this.value)"></label>
    <label class="infield"><span>目標 <i class="u">kg</i></span>
      <input class="numin tgt" id="tgtin" type="number" inputmode="decimal" step="2.5" onchange="setCfg('tgt',this.value)"></label>
  </div>
  <div class="freqrow"><span>週の頻度</span><div class="freqseg" id="freqseg"></div></div>
  <div class="feasib" id="feasib"></div>
  <div id="arbanner"></div>
</div>
<div class="sched" id="sched" style="display:none">
  <div class="lbl">推奨 週スケジュール</div>
  <div class="schedgrid" id="schedgrid"></div>
  <div class="schedwarn" id="schedwarn"></div>
</div>

<div class="tools">
  <button class="tbtn go" onclick="jumpNext()">次の未完了へ</button>
  <button class="tbtn book" onclick="openIndex()">📖 種目の説明</button>
  <button class="tbtn" onclick="exportData()">バックアップ書出</button>
  <button class="tbtn" onclick="document.getElementById('file').click()">復元</button>
  <button class="tbtn" onclick="resetAll()">リセット</button>
  <input type="file" id="file" accept="application/json" onchange="importData(this)">
</div>
<div class="legend">
  <span class="lg"><i style="background:var(--acc)"></i>蓄積</span>
  <span class="lg"><i style="background:var(--int)"></i>強度</span>
  <span class="lg"><i style="background:var(--del)"></i>デロード</span>
  <span class="lg"><i style="background:var(--peak)"></i>ピーク</span>
  <span class="lg"><i style="background:var(--test)"></i>テスト</span>
</div>

<main id="app"></main>
<div class="note">
  iPhoneでアプリ化:<br>Safariの共有ボタン → 「ホーム画面に追加」<br>
  種目を切替えて3種目それぞれの目標を設定できます。重量は現在値→目標値から自動設計されます。<br>
  進捗は端末内に自動保存されます。機種変更に備え時々「バックアップ書出」を。
</div>
<div class="toast" id="toast"></div>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"><div class="grip"></div><button class="close" onclick="closeSheet()">✕</button><div id="sheetbody"></div></div>

<script>
const C={acc:'var(--acc)',int:'var(--int)',del:'var(--del)',peak:'var(--peak)',test:'var(--test)'};

/* ===== 週ごとの基準max進行(現在値→目標値) ピーキングカーブ ===== */
const PROG=[0.15,0.30,0.42,0.45,0.55,0.68,0.80,0.82,0.88,0.94,0.97,1.00];

/* ===== 周期化テンプレート(全リフト共通) =====
   lift tuple: [role, pct(基準maxに対する割合), reps, sets, rpe, kind, labelOverride?]
   kind: 0=休養 1=working 2=スピード 3=ウォームアップ                       */
const TPL=[
 {lab:"Week 1 ｜ 第1ブロック 蓄積期",ph:"蓄積期",c:C.acc,
  intro:"量で土台構築・ボトム導入。RPEは『あと何回いけるか』。RPE7=余裕3回。",
  days:[
   {n:"Day1 量",dt:"vol",lifts:[["comp",0.7775,5,4,"RPE7",1],["narrow",0.6695,8,3,"RPE7",1]]},
   {n:"Day2 ボトム",dt:"bottom",lifts:[["spoto",0.7127,5,4,"RPE7",1],["feetup",0.7235,6,3,"RPE7",1]]},
   {n:"Day3 初速",dt:"speed",lifts:[["pin",0.7775,3,5,"RPE7",1],["dynamic",0.4968,3,6,"",2]]},
  ]},
 {lab:"Week 2 ｜ 蓄積期",ph:"蓄積期",c:C.acc,intro:"微増。RPE7.5。",
  days:[
   {n:"Day1 量",dt:"vol",lifts:[["comp",0.7940,5,4,"RPE7.5",1],["narrow",0.6867,8,3,"RPE7.5",1]]},
   {n:"Day2 ボトム",dt:"bottom",lifts:[["spoto",0.7296,5,4,"RPE8",1],["feetup",0.7296,6,3,"RPE7.5",1]]},
   {n:"Day3 初速",dt:"speed",lifts:[["pin",0.7940,3,5,"RPE7.5",1],["dynamic",0.5150,3,6,"",2]]},
  ]},
 {lab:"Week 3 ｜ 蓄積期(ピーク量)",ph:"蓄積期",c:C.acc,intro:"本ブロック最大量。RPE8=余裕2回。",

/* 全リフト共通 */
function EX(role){return EXPLAIN[S.lift][role]||null;}
const WARMUP_EX={t:"ウォームアップ",diff:"本番前の準備セット。",how:["軽い重量から段階的に上げる","フォーム確認と関節を温めるのが目的","疲れない範囲で(追い込まない)"],aim:"本番の重量に体を慣らす。",warn:"ここで疲労を残さない。"};
const REST_EX={t:"完全休養",diff:"トレーニングを休む日。",how:["重い練習はしない","軽い有酸素やストレッチはOK"],aim:"疲労を抜いて回復する(ピーキングの肝)。",warn:"『休む勇気』。ここで追い込むと本番に響く。"};
function getExplain(role){if(role==="warmup")return WARMUP_EX;if(role==="rest")return REST_EX;if(role==="base")return EXPLAIN[S.lift].base;return EX(role);}

/* ===== State ===== */
const KEY="big3_v1";
function defCfg(k){return {cur:LIFTMETA[k].cur,tgt:LIFTMETA[k].tgt,freq:LIFTMETA[k].freq,tmFactor:1,lastLog:-1};}
let S={mode:"concurrent",lift:"bench",cfg:{},dates:{},checks:{},actuals:{},open:0};
LIFTS.forEach(k=>{S.cfg[k]=defCfg(k);});
try{const r=localStorage.getItem(KEY); if(r){const p=JSON.parse(r);
  S=Object.assign(S,p);
  LIFTS.forEach(k=>{S.cfg[k]=Object.assign(defCfg(k),S.cfg[k]||{});});}}catch(e){}

function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}
function cfg(){return S.cfg[S.lift];}
function fmt(w){const r=Math.round(w*100)/100; return (Number.isInteger(r)?r:r).toString();}
function round125(x){return Math.round(x/1.25)*1.25;}
function refMax(wi){const c=cfg();return c.cur+(c.tgt-c.cur)*PROG[wi];}
function weightOf(wi,pct){const c=cfg();const f=wi>c.lastLog?c.tmFactor:1;return round125(refMax(wi)*pct*f);}
/* 並行モードで実施する曜日を頻度から決める(テスト週は常に全日) */
function activeDays(wk){if(wk.days.length<=1)return wk.days.map((d,di)=>({d,di}));
  return wk.days.map((d,di)=>({d,di})).filter(x=>x.di<cfg().freq);}
/* 実測→推定1RM→以降の週を調整(平滑化+上限) */
function updateTM(wi,di,li,sel){
  const l=TPL[wi].days[di].lifts[li]; if(l[5]!==1||!sel)return;
  const tR=parseFloat(String(l[4]||'').replace('RPE','')); if(isNaN(tR)||tR<7)return; // 軽い/デロード週は学習しない
  const felt={1:5,2:6.5,3:8,4:9,5:10}[sel]; const reps=l[2];
  // 同負荷なので比は『感じたRIR vs 目標RIR』のみで決まる(loadは相殺)
  const ratio=(1+(reps+(10-felt))/30)/(1+(reps+(10-tR))/30);
  const c=cfg();
  let nf=c.tmFactor*(0.5+0.5*ratio);
  nf=Math.max(0.93,Math.min(1.07,nf));
  c.tmFactor=Math.round(nf*1000)/1000;
  c.lastLog=Math.max(c.lastLog,wi);
}

/* ===== Sheets ===== */
function sheetShow(html){document.getElementById('sheetbody').innerHTML=html;
 document.getElementById('overlay').classList.add('show');document.getElementById('sheet').classList.add('show');}
function closeSheet(){document.getElementById('overlay').classList.remove('show');document.getElementById('sheet').classList.remove('show');}
function openInfo(role){const e=getExplain(role);if(!e)return;
 let h=`<h3>${e.t}</h3><div class="diff">${e.diff}</div>`;
 h+=`<h4>やり方</h4><ol>${e.how.map(s=>`<li>${s}</li>`).join('')}</ol>`;
 h+=`<h4>狙い</h4><div class="box aim">${e.aim}</div>`;
 h+=`<h4>注意</h4><div class="box warn">${e.warn}</div>`;
 if(role!=='base'){h+=`<h4 style="margin-top:18px">共通</h4><button class="idxbtn" onclick="openInfo('base')">基本フォーム & 安全<small>${LIFTMETA[S.lift].jp}の構え・セーフティの置き方</small></button>`;}
 sheetShow(h);}
function openIndex(){
 const nm=LIFTMETA[S.lift].names;
 const order=[['base','まずこれ。共通の構え・セーフティ'],['comp','本番フォームの固め'],['narrow','補助①'],
  ['feetup','補助②'],['spoto','弱点の局面を直撃'],['pin','ボトム絶対筋力(最重要の武器)'],
  ['dynamic','初速・爆発力'],['warmup','本番前の準備'],['rest','回復日']];
 let h=`<h3>種目の説明 ｜ ${LIFTMETA[S.lift].jp}</h3><div class="diff">見たい種目をタップ。各週の種目名の「ⓘやり方」からも開けます。</div>`;
 h+=order.map(([k,d])=>{const e=getExplain(k);return `<button class="idxbtn" onclick="openInfo('${k}')">${e.t}<small>${d}</small></button>`;}).join('');
 sheetShow(h);}

/* ===== 推奨(前回フィードバックから) ===== */
const app=document.getElementById('app');
function deltaFromFeel(feelVal,tRPE){
  if(!feelVal||isNaN(tRPE))return null;
  const felt={1:5,2:6.5,3:8,4:9,5:10}[feelVal];
  const diff=felt-tRPE;
  if(diff<=-1.5)return 2.5;
  if(diff<=0.5)return 0;
  if(diff<=1.5)return -2.5;
  return -5;
}
function priorDelta(wi,di,li){
  const role=TPL[wi].days[di].lifts[li][0]; if(role==='warmup'||role==='rest')return 0;
  const curPos=wi*1000+di*100+li; let best=-1,bd=0;
  TPL.forEach((wk,wj)=>wk.days.forEach((d,dj)=>d.lifts.forEach((l,lj)=>{
    if(l[5]!==1||l[0]!==role)return;
    const pos=wj*1000+dj*100+lj; if(pos>=curPos)return;
    const fv=S.actuals[`${S.lift}_${wj}_${dj}_${lj}`]; if(!fv)return;
    const dd=deltaFromFeel(fv,parseFloat(String(l[4]||'').replace('RPE',''))); if(dd===null)return;
    if(pos>best){best=pos;bd=dd;}
  })));
  return best>=0?bd:0;
}

/* ===== Render ===== */
function render(){
  // header / tabs / setup
  const m=LIFTMETA[S.lift],c=cfg();
  document.getElementById('liftname').textContent=m.short;
  document.getElementById('dispcur').textContent=fmt(c.cur);
  document.getElementById('disptgt').textContent=fmt(c.tgt)+' KG';
  document.getElementById('setuplbl').textContent=m.jp+'｜目標設定';
  document.getElementById('curin').value=c.cur;
  document.getElementById('tgtin').value=c.tgt;
  document.getElementById('mode-focus').classList.toggle('on',S.mode==='focus');
  document.getElementById('mode-concurrent').classList.toggle('on',S.mode==='concurrent');
  renderTabs(); renderFreq(); renderFeasib(); renderAR(); renderSched();

  app.innerHTML='';
  TPL.forEach((wk,wi)=>{
    const days=activeDays(wk);
    const ids=[]; days.forEach(({d,di})=>d.lifts.forEach((l,li)=>{if(l[0]!=='rest')ids.push(`${S.lift}_${wi}_${di}_${li}`);}));
    const done=ids.filter(id=>S.checks[id]).length, tot=ids.length, all=done===tot&&tot>0;
    const card=document.createElement('div');
    card.className='wk'+(S.open===wi?' open':'')+(all?' alldone':'');
    card.style.setProperty('--phase',wk.c);
    let body=`<div class="intro">${wk.intro}</div>`;
    days.forEach(({d,di})=>{
      const dkey=`${S.lift}_${wi}_${di}`;
      body+=`<div class="day"><div class="dayhead"><span class="dayname">${d.n}</span>`+
        `<input class="dateinp" type="date" value="${S.dates[dkey]||''}" onchange="setDate('${dkey}',this.value)"></div>`;
      d.lifts.forEach((l,li)=>{
        const id=`${S.lift}_${wi}_${di}_${li}`, ck=!!S.checks[id];
        const [role,pct,reps,sets,rpe,kind,labOv]=l;
        const name=labOv||m.names[role];
        const w=kind===0?0:weightOf(wi,pct);
        let nums='';
        if(kind===0){nums='';}
        else if(kind===3){nums=`<div class="exnums warm">${fmt(w)}<span class="lt">kg ×${reps}</span></div>`;}
        else if(kind===2){nums=`<div class="exnums speed">${fmt(w)}<span class="lt">kg × ${reps}回 × ${sets}set</span></div>`;}
        else{nums=`<div class="exnums">${fmt(w)}<span class="lt">kg × ${reps}回 × ${sets}set</span></div>`;}
        if(kind===1){const sg=priorDelta(wi,di,li); if(sg!==0){nums=nums.replace('</div>',`<span class="suggest">推奨 ${fmt(w+sg)}kg</span></div>`);}}
        let rpebadge='';
        if(kind===1&&rpe)rpebadge=`<span class="rpe">${rpe}</span>`;
        else if(kind===2)rpebadge=`<span class="rpe">速度${Math.round(pct*100)}%</span>`;
        let actual='';
        if(kind===1){
          const sel=S.actuals[id]||'';
          const FEEL=[['','— 実測を記録 —'],['1','楽だった（あと5回以上）'],['2','やや余裕（あと3〜4回）'],['3','ちょうど（あと2回）'],['4','きつい（あと1回）'],['5','限界（もう上がらない）']];
          const opts=FEEL.map(([v,t])=>`<option value="${v}"${v===sel?' selected':''}>${t}</option>`).join('');
          let reco='';
          if(sel){const tR=parseFloat(String(rpe||'').replace('RPE','')); const dd=deltaFromFeel(sel,tR);
            const tail=(tR>=7)?'（以降の週へ自動反映）':'';
            if(dd!==null){ if(dd>0)reco=`<div class="reco up">▲ 軽め → 強度を上げます${tail}</div>`;
              else if(dd<0)reco=`<div class="reco down">▼ ${dd<=-5?'重すぎ':'やや重い'} → 強度を下げます・無理は禁物${tail}</div>`;
              else reco=`<div class="reco ok">✓ 狙い通り（RPE${tR}）→ 現状維持でOK</div>`; }}
          actual=`<div class="actual"><select onchange="setAct('${id}',this.value)">${opts}</select>${reco}</div>`;
        }
        const tappable=(role!=='rest');
        const nameHtml=tappable?`<div class="exname tappable" onclick="openInfo('${role}')">${name}<span class="info">ⓘやり方</span></div>`:`<div class="exname">${name}</div>`;
        body+=`<div class="ex${ck?' done':''}${kind===0?' rest':''}">`+
          (kind===0?`<div class="chk" style="visibility:hidden"></div>`:`<div class="chk" onclick="toggle('${id}')"><svg viewBox="0 0 24 24"><path d="M4 12l5 5L20 6"/></svg></div>`)+
          `<div class="exmain">${nameHtml}${nums}${actual}</div>${rpebadge}</div>`;
      });
      body+=`<div class="memo">${m.acc[d.dt]||''}</div></div>`;
    });
    card.innerHTML=`<div class="wkhead" onclick="toggleWk(${wi})">`+
      `<div class="ttl"><div class="lab">${wk.lab}</div><div class="phase">${wk.ph}</div></div>`+
      `<span class="wkprog${all?' done':''}">${done}/${tot}</span><span class="chev">▶</span></div>`+
      `<div class="wkbody">${body}</div>`;
    app.appendChild(card);
  });
  updateBar();
}
function renderTabs(){
  const t=document.getElementById('tabs');
  t.innerHTML=LIFTS.map(k=>`<button class="tab${S.lift===k?' on':''}" onclick="switchLift('${k}')">${LIFTMETA[k].short}</button>`).join('');
}
function renderFeasib(){
  const c=cfg(),el=document.getElementById('feasib');
  const cur=parseFloat(c.cur),tgt=parseFloat(c.tgt);
  if(isNaN(cur)||isNaN(tgt)||cur<=0||tgt<=0){el.className='feasib warn';el.textContent='現在値と目標値を入力してください。';return;}
  if(tgt<=cur){el.className='feasib warn';el.textContent='目標が現在値以下です。目標を現在値より上に設定してください。';return;}
  const gain=tgt-cur, pct=gain/cur*100;
  const perMonth=gain/3; // 12週=約3ヶ月
  let cls,msg;
  if(pct<=6){cls='ok';msg='妥当な目標。12週で十分到達が狙えます。';}
  else if(pct<=12){cls='ok';msg='挑戦的だが現実的。フォームと回復を整えれば到達可能。';}
  else if(pct<=20){cls='warn';msg='かなり攻めた目標。栄養・睡眠・補助種目を徹底。未達でも自己ベスト更新が狙えます。';}
  else{cls='bad';msg='12週(1サイクル)では大きすぎる伸び幅かも。複数サイクルに分けるのが安全です。';}
  el.className='feasib '+cls;
  el.innerHTML=`+${fmt(gain)}kg（+${pct.toFixed(1)}%／約${fmt(Math.round(perMonth*10)/10)}kg/月）<br>${msg}`;
}
function renderFreq(){
  const c=cfg();const seg=document.getElementById('freqseg');
  seg.innerHTML=[1,2,3].map(n=>`<button class="${c.freq===n?'on':''}" onclick="setFreq(${n})">${n}</button>`).join('')+`<span style="margin-left:6px">回/週</span>`;
}
function renderAR(){
  const c=cfg(),el=document.getElementById('arbanner');
  if(c.tmFactor===1){el.innerHTML='';return;}
  const p=((c.tmFactor-1)*100); const sign=p>0?'+':'';
  const proj=round125(c.tgt*c.tmFactor);
  el.innerHTML=`<div class="arbanner">📈 実測を反映中：以降の週を ${sign}${p.toFixed(1)}% 調整（推定到達 ≈ ${fmt(proj)}kg）<button onclick="resetAR()">解除</button></div>`;
}
function renderSched(){
  const el=document.getElementById('sched');
  if(S.mode!=='concurrent'){el.style.display='none';return;}
  el.style.display='block';
  // 種目をラウンドロビンで均等配置(SQとDLが連続しにくい)
  const order=['squat','bench','deadlift'];
  const colJ={squat:'var(--del)',bench:'var(--accent)',deadlift:'var(--acc)'};
  let n=0; const buckets={}; order.forEach(k=>{buckets[k]=S.cfg[k].freq;n+=S.cfg[k].freq;});
  let rr=[]; while(rr.length<n){order.forEach(k=>{if(buckets[k]>0){rr.push(k);buckets[k]--;}});}
  const days=['月','火','水','木','金','土','日'];
  const plan=days.map(()=>[]);
  rr.forEach((k,i)=>{plan[Math.round(i*7/Math.max(n,1))%7].push(k);});
  document.getElementById('schedgrid').innerHTML=days.map((dn,i)=>{
    const cells=plan[i].map(k=>`<span class="pill" style="background:${colJ[k]}">${LIFTMETA[k].short}</span>`).join('');
    return `<div class="d"><div class="dn">${dn}</div>${cells||'<div class="rest">休</div>'}</div>`;
  }).join('');
  const w=document.getElementById('schedwarn');
  let cls,msg;
  if(n<=4){cls='ok';msg=`週${n}セッション。回復に余裕があり継続しやすい配分です。`;}
  else if(n<=6){cls='warn';msg=`週${n}セッション。標準〜やや多め。睡眠・栄養を確保し、腰の疲労が抜けなければ頻度を下げて。`;}
  else{cls='bad';msg=`週${n}セッションは多すぎる傾向。特にデッドの頻度を1回に下げ、スクワットと連日にしないことを推奨します。`;}
  w.className='schedwarn '+cls; w.textContent=msg;
}
function updateBar(){
  let done=0,tot=0;
  TPL.forEach((wk,wi)=>activeDays(wk).forEach(({d,di})=>d.lifts.forEach((l,li)=>{if(l[0]==='rest')return;tot++; if(S.checks[`${S.lift}_${wi}_${di}_${li}`])done++;})));
  const p=tot?Math.round(done/tot*100):0;
  const CC=131.9, off=CC*(1-p/100);
  const rf=document.getElementById('ringfill'); if(rf)rf.style.strokeDashoffset=off.toFixed(1);
  document.getElementById('pctlabel').textContent=p+'%';
  const cl=document.getElementById('countlabel'); if(cl)cl.textContent=done+'/'+tot;
}
function flash(){const t=document.getElementById('savetag'); t.textContent='✓ 保存しました'; t.style.color='var(--ok)';
  clearTimeout(window._ft); window._ft=setTimeout(()=>{t.textContent='✓ 自動保存';t.style.color='';},1200);}

/* ===== Actions ===== */
function switchLift(k){if(S.lift===k)return; S.lift=k; S.open=0; save(); render(); window.scrollTo({top:0,behavior:'smooth'});}
function setMode(m){S.mode=m; save(); render();}
function setFreq(n){cfg().freq=n; save(); flash(); render();}
function resetAR(){const c=cfg();c.tmFactor=1;c.lastLog=-1; save(); render(); toast('実測の自動調整を解除しました');}
function setCfg(field,v){const n=parseFloat(v); if(!isNaN(n)&&n>0)cfg()[field]=n; save(); flash(); render();}
function toggle(id){S.checks[id]=!S.checks[id]; if(!S.checks[id])delete S.checks[id]; save(); flash(); render();}
function setDate(k,v){if(v)S.dates[k]=v;else delete S.dates[k]; save(); flash();}
function setAct(id,v){if(v)S.actuals[id]=v;else delete S.actuals[id];
  const m=id.match(/_(\d+)_(\d+)_(\d+)$/); if(m)updateTM(+m[1],+m[2],+m[3],v);
  save(); flash(); render();}
function toggleWk(wi){S.open=(S.open===wi?-1:wi); save(); render();
  if(S.open===wi){const el=app.children[wi]; setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'start'}),60);}}
function jumpNext(){
  for(let wi=0;wi<TPL.length;wi++){const wk=TPL[wi];let inc=false;
    activeDays(wk).forEach(({d,di})=>d.lifts.forEach((l,li)=>{if(l[0]==='rest')return;if(!S.checks[`${S.lift}_${wi}_${di}_${li}`])inc=true;}));
    if(inc){S.open=wi;save();render();const el=app.children[wi];setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'start'}),60);return;}}
  toast(LIFTMETA[S.lift].jp+'の全メニュー完了！お疲れさまでした');
}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1900);}
async function exportData(){
  const data=JSON.stringify(S,null,2);
  const fname='big3_backup_'+new Date().toISOString().slice(0,10)+'.json';
  try{
    const file=new File([data],fname,{type:'application/json'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:'BIG3 PEAK バックアップ'});
      toast('共有先に保存しました'); return;
    }
  }catch(e){ if(e&&e.name==='AbortError')return; }
  try{
    const blob=new Blob([data],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fname;
    document.body.appendChild(a);a.click();a.remove();toast('ファイルに書き出しました');
  }catch(e){toast('書き出しに失敗しました');}
}
function importData(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();
  r.onload=e=>{try{const d=JSON.parse(e.target.result);
    S=Object.assign({mode:"concurrent",lift:"bench",cfg:{},dates:{},checks:{},actuals:{},open:0},d);
    LIFTS.forEach(k=>{S.cfg[k]=Object.assign(defCfg(k),S.cfg[k]||{});});
    save();render();toast('復元しました');}catch(err){toast('読み込み失敗');}};
  r.readAsText(f);inp.value='';}
function resetAll(){if(confirm('現在の種目('+LIFTMETA[S.lift].jp+')の日付・チェック・実測・自動調整を消去します。よろしいですか？\n※目標設定と他種目は残ります')){
  const pre=S.lift+'_';
  [['checks'],['dates'],['actuals']].forEach(([k])=>{Object.keys(S[k]).forEach(id=>{if(id.indexOf(pre)===0)delete S[k][id];});});
  cfg().tmFactor=1; cfg().lastLog=-1;
  save();render();toast('リセットしました');}}
render();
